<!DOCTYPE html>
<html lang="pt-br">
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="keywords" content="HTML, CSS, JavaScript">
    <meta name="description" content="Jogo pedra papel e tesoura em HTML e CSS.">
    <meta name="author" content="Luana Rocha Miron">
    <meta name="robots" content="index,follow">
    <meta name="X-UA-Compatible" content="IE=7">
    <link rel="shortcut icon" href="img/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <title>Pedra Papel Tesoura</title>
</head>
<body>
  <section class="container">
  
    <div class="result_field">
       
        <div class="result_images">
            <span class="user_result">
                <img src="img/rock.png" alt="User's choice image" />
            </span>
            <span class="bot_result">
                <img src="img/rock.png" alt="BOT's choice image" />
            </span>
        </div>
      
        <div class="result">Let's Play!</div>
    </div>
   
    <div class="option_images">
        <span class="option_image">
            <img src="img/rock.png" alt="Rock image" />
            <p>Rock</p>
        </span>
        <span class="option_image">
            <img src="img/paper.png" alt="Paper image" />
            <p>Paper</p>
        </span>
        <span class="option_image">
            <img src="img/scissors.png" alt="Scissors image" />
            <p>Scissors</p>
        </span>
    </div>
</section>
  <script src="js/script.js" defer></script>
</body>
</html>
